name: qr_lens
description: A polished QR code scanner with animated capture overlay, live corner tracking, torch control, scan history, and URL detection. Built on camera and ML Kit.
version: 1.0.1
homepage: https://github.com/chhunlyyy/qr_lens
repository: https://github.com/chhunlyyy/qr_lens
issue_tracker: https://github.com/chhunlyyy/qr_lens/issues

environment:
  sdk: ^3.7.2
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  google_mlkit_barcode_scanning: ^0.12.0
  camera: ^0.11.1
  permission_handler: ^11.3.1
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
